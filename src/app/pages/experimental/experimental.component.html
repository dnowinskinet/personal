@if (showExperimentIndex()) {
    <section class="relative mt-8">
        <div class="space-y-6">
            <header>
                <h2 class="flex justify-start text-xl font-semibold dark:text-gray-200">Experimental Features</h2>
                <p class="mb-4 dark:text-gray-300">Playable prototypes and rule experiments.</p>
            </header>

            <div class="grid gap-4 md:grid-cols-2">
                @for (experiment of experiments; track experiment.path) {
                    <a
                        [routerLink]="experiment.path"
                        class="rounded-lg border border-zinc-200 bg-white p-5 transition hover:border-cyan-500 hover:text-cyan-950 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500 dark:border-zinc-800 dark:bg-zinc-950 dark:text-zinc-100 dark:hover:border-cyan-400 dark:hover:text-cyan-100"
                    >
                        <span class="text-sm font-semibold uppercase text-zinc-500 dark:text-zinc-400">Experiment</span>
                        <h3 class="mt-2 text-xl font-bold">{{ experiment.label }}</h3>
                        <p class="mt-3 text-sm text-zinc-600 dark:text-zinc-300">{{ experiment.description }}</p>
                    </a>
                }
            </div>
        </div>
    </section>
}

<router-outlet></router-outlet>
